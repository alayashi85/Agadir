<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مواد الديكور | أغادير</title>
  <link rel="stylesheet" href="categories.css">
</head>
<body>

<header>
  <h1>مواد أغادير للديكور</h1>
  <a href="index.html">الرئيسية</a>
</header>

<section class="hero">
  <h2>تصنيفات المواد</h2>
  <p>اختر نوع المادة وشاهد التفاصيل والصور</p>
</section>

<main>
  <div id="categoriesGrid" class="grid"></div>
</main>

<script>
fetch("data/categories.json")
  .then(res => res.json())
  .then(categories => {
    const grid = document.getElementById("categoriesGrid");

    categories.forEach(cat => {
      grid.innerHTML += `
        <div class="card">
          <img src="${cat.image}" alt="${cat.name}">
          <div class="content">
            <h3>${cat.name}</h3>
            <p>${cat.description}</p>
            <a href="https://wa.me/9647700000000?text=مرحبا، أريد معلومات عن ${encodeURIComponent(cat.name)}" target="_blank">
              استفسار واتساب
            </a>
          </div>
        </div>
      `;
    });
  })
  .catch(() => {
    document.getElementById("categoriesGrid").innerHTML =
      "<p>لم يتم تحميل التصنيفات.</p>";
  });
</script>

</body>
</html>
