<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة أغادير | إدارة التصنيفات</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header>
  <h1>لوحة أغادير للديكور</h1>
  <a href="index.html">الرجوع للموقع</a>
</header>

<main class="admin-layout">

  <section class="form-box">
    <h2>إضافة تصنيف مادة</h2>

    <label>اسم التصنيف</label>
    <input id="catName" type="text" placeholder="مثال: ألواح بديل الرخام">

    <label>الوصف</label>
    <textarea id="catDesc" placeholder="وصف مختصر عن المادة"></textarea>

    <label>رابط الصورة</label>
    <input id="catImage" type="text" placeholder="images/marble.jpg">

    <button onclick="addCategory()">إضافة التصنيف</button>
    <button class="secondary" onclick="generateJson()">توليد JSON</button>
  </section>

  <section class="preview-box">
    <h2>المعاينة</h2>
    <div id="preview" class="preview-grid"></div>
  </section>

</main>

<section class="json-box">
  <h2>انسخ هذا الكود إلى data/categories.json</h2>
  <textarea id="jsonOutput" readonly></textarea>
</section>

<script src="admin.js"></script>
</body>
</html>
